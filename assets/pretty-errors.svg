<svg xmlns="http://www.w3.org/2000/svg" width="1138" height="848" viewBox="0 0 1138 848" role="img" aria-labelledby="title description">
  <title id="title">Weaver deployment CLI showcase</title>
  <desc id="description">Roc record-builder source followed by a successful typed deployment plan and a structured missing-option diagnostic.</desc>
  <rect width="1138" height="848" rx="10" fill="#0d1117"/>
  <path d="M10 0h1118a10 10 0 0 1 10 10v28H0V10A10 10 0 0 1 10 0z" fill="#161b22"/>
  <circle cx="20" cy="19" r="5" fill="#ff7b72"/>
  <circle cx="38" cy="19" r="5" fill="#d29922"/>
  <circle cx="56" cy="19" r="5" fill="#3fb950"/>
  <text x="569.0" y="24" text-anchor="middle" fill="#8b949e" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">Weaver · deploy showcase</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="14">
    <text x="24" y="72" xml:space="preserve"><tspan fill="#bc8cff" font-weight="700">examples/deploy.roc</tspan></text>
<text x="24" y="94" xml:space="preserve"><tspan fill="#8b949e"> 1 │</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#39c5cf">DeployConfig</tspan><tspan fill="#c9d1d9"> : {</tspan></text>
<text x="24" y="116" xml:space="preserve"><tspan fill="#8b949e"> 2 │</tspan><tspan fill="#c9d1d9">     dry_run : </tspan><tspan fill="#39c5cf">Bool</tspan><tspan fill="#c9d1d9">,</tspan></text>
<text x="24" y="138" xml:space="preserve"><tspan fill="#8b949e"> 3 │</tspan><tspan fill="#c9d1d9">     environment : </tspan><tspan fill="#39c5cf">Str</tspan><tspan fill="#c9d1d9">,</tspan></text>
<text x="24" y="160" xml:space="preserve"><tspan fill="#8b949e"> 4 │</tspan><tspan fill="#c9d1d9">     labels : </tspan><tspan fill="#39c5cf">List</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#39c5cf">Str</tspan><tspan fill="#c9d1d9">),</tspan></text>
<text x="24" y="182" xml:space="preserve"><tspan fill="#8b949e"> 5 │</tspan><tspan fill="#c9d1d9">     region : </tspan><tspan fill="#39c5cf">Str</tspan><tspan fill="#c9d1d9">,</tspan></text>
<text x="24" y="204" xml:space="preserve"><tspan fill="#8b949e"> 6 │</tspan><tspan fill="#c9d1d9">     replicas : </tspan><tspan fill="#39c5cf">U64</tspan><tspan fill="#c9d1d9">,</tspan></text>
<text x="24" y="226" xml:space="preserve"><tspan fill="#8b949e"> 7 │</tspan><tspan fill="#c9d1d9">     target_image : </tspan><tspan fill="#39c5cf">Str</tspan><tspan fill="#c9d1d9">,</tspan></text>
<text x="24" y="248" xml:space="preserve"><tspan fill="#8b949e"> 8 │</tspan><tspan fill="#c9d1d9"> }</tspan></text>
<text x="24" y="270" xml:space="preserve"><tspan fill="#8b949e"> 9 │</tspan><tspan fill="#c9d1d9"> </tspan></text>
<text x="24" y="292" xml:space="preserve"><tspan fill="#8b949e">10 │</tspan><tspan fill="#c9d1d9"> deploy_fields = {</tspan></text>
<text x="24" y="314" xml:space="preserve"><tspan fill="#8b949e">11 │</tspan><tspan fill="#c9d1d9">     dry_run: </tspan><tspan fill="#39c5cf">Opt.flag</tspan><tspan fill="#c9d1d9">(dry_run_option),</tspan></text>
<text x="24" y="336" xml:space="preserve"><tspan fill="#8b949e">12 │</tspan><tspan fill="#c9d1d9">     environment: </tspan><tspan fill="#39c5cf">Opt.str</tspan><tspan fill="#c9d1d9">(environment_option),</tspan></text>
<text x="24" y="358" xml:space="preserve"><tspan fill="#8b949e">13 │</tspan><tspan fill="#c9d1d9">     labels: </tspan><tspan fill="#39c5cf">Opt.str_list</tspan><tspan fill="#c9d1d9">(label_option),</tspan></text>
<text x="24" y="380" xml:space="preserve"><tspan fill="#8b949e">14 │</tspan><tspan fill="#c9d1d9">     region: </tspan><tspan fill="#39c5cf">Opt.str</tspan><tspan fill="#c9d1d9">(region_option),</tspan></text>
<text x="24" y="402" xml:space="preserve"><tspan fill="#8b949e">15 │</tspan><tspan fill="#c9d1d9">     replicas: </tspan><tspan fill="#39c5cf">Opt.u64</tspan><tspan fill="#c9d1d9">(replicas_option),</tspan></text>
<text x="24" y="424" xml:space="preserve"><tspan fill="#8b949e">16 │</tspan><tspan fill="#c9d1d9">     target_image: </tspan><tspan fill="#39c5cf">Param.str</tspan><tspan fill="#c9d1d9">(image_parameter),</tspan></text>
<text x="24" y="446" xml:space="preserve"><tspan fill="#8b949e">17 │</tspan><tspan fill="#c9d1d9"> }.</tspan><tspan fill="#39c5cf">Cli</tspan></text>
<text x="24" y="468" xml:space="preserve"></text>
<text x="24" y="490" xml:space="preserve"><tspan fill="#3fb950" font-weight="700">$</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#c9d1d9" font-weight="700">deploy api:v2 -e production -r 4 -l team=payments -n</tspan></text>
<text x="24" y="512" xml:space="preserve"><tspan fill="#c9d1d9">Deployment plan:</tspan></text>
<text x="24" y="534" xml:space="preserve"><tspan fill="#c9d1d9">{ dry_run: True, environment: &quot;production&quot;, labels: [&quot;team=payments&quot;], region: &quot;us-east-1&quot;, replicas: 4, target_image: &quot;api:v2&quot; }</tspan></text>
<text x="24" y="556" xml:space="preserve"></text>
<text x="24" y="578" xml:space="preserve"><tspan fill="#3fb950" font-weight="700">$</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#c9d1d9" font-weight="700">deploy api:v2 --replicas 4</tspan></text>
<text x="24" y="600" xml:space="preserve"><tspan fill="#8b949e">┌────────────────┐</tspan></text>
<text x="24" y="622" xml:space="preserve"><tspan fill="#8b949e">│ </tspan><tspan fill="#39c5cf" font-weight="700">MISSING OPTION</tspan><tspan fill="#8b949e"> │</tspan></text>
<text x="24" y="644" xml:space="preserve"><tspan fill="#8b949e">└────────────────┘</tspan></text>
<text x="24" y="666" xml:space="preserve"></text>
<text x="24" y="688" xml:space="preserve"><tspan fill="#c9d1d9">Required option -e/--environment is missing.</tspan></text>
<text x="24" y="710" xml:space="preserve"></text>
<text x="24" y="732" xml:space="preserve"><tspan fill="#39c5cf" font-weight="700" text-decoration="underline">Usage:</tspan></text>
<text x="24" y="754" xml:space="preserve"><tspan fill="#39c5cf" font-weight="700">  deploy -e/--environment STR [-n/--dry-run] [-l/--label STR]... [--region STR]</tspan></text>
<text x="24" y="776" xml:space="preserve"><tspan fill="#39c5cf" font-weight="700">  [-r/--replicas NUM] [-h/--help] [-V/--version] &lt;image&gt;</tspan></text>
<text x="24" y="798" xml:space="preserve"></text>
<text x="24" y="820" xml:space="preserve"><tspan fill="#3fb950" font-weight="700">Tip: Provide `-e/--environment string` as shown in Usage.</tspan></text>
  </g>
</svg>
