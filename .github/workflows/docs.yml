name: Docs

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Roc
        uses: roc-lang/setup-roc@66d1ae2def87ec77b8670e9ac09c418df2f18c86
        with:
          version: nightly-new-compiler

      - name: Generate docs
        run: roc docs package/main.roc --output=generated-docs

      - name: Fix absolute paths
        run: |
          find generated-docs/ -type f -name '*.html' -exec sed -i "s/\(href\|src\)=\"\//\1=\"\/${{ github.event.repository.name }}\//g" {} +

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: generated-docs

      - name: Deploy docs
        id: deployment
        uses: actions/deploy-pages@v4
